name: Sync Version & Create Release

on:
  pull_request:
    branches:
      - main
    paths:
      - 'bin/git-trello'
      - 'version.txt'
      - 'scripts/sync-version.sh'
      - 'tests/git-trello-coverage.sh'
      - 'tests/sync-version-coverage.sh'
      - 'tests/cli-tests.sh'
      - '.github/workflows/auto-version.yml'
  push:
    branches:
      - main
    paths:
      - 'bin/git-trello' # Only run when the main script changes

jobs:
  validate-version:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify version source of truth
        run: |
          bash scripts/sync-version.sh --check

      - name: Enforce 100% coverage for sync-version script
        run: |
          bash tests/sync-version-coverage.sh

      - name: Enforce 100% coverage for git-trello script
        run: |
          bash tests/git-trello-coverage.sh

      - name: Run CLI integration tests
        run: |
          bash tests/cli-tests.sh

      - name: Verify sync script from non-root directories
        run: |
          (
            cd scripts
            bash sync-version.sh --check
          )
          (
            cd /tmp
            bash "$GITHUB_WORKSPACE/scripts/sync-version.sh" --check
          )

  sync-and-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push commits and create releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # CRITICAL: Fetches all history so we can check existing tags

      - name: Extract version from script
        id: get_version
        run: |
          VERSION=$(bash scripts/sync-version.sh --print)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Update version.txt
        run: |
          bash scripts/sync-version.sh --write

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt
          git diff --staged --quiet || (git commit -m "chore: sync version.txt to ${{ env.VERSION }}" && git push)

      - name: Verify synced version
        run: |
          bash scripts/sync-version.sh --check

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ env.VERSION }}"
          
          # Check if the release already exists so the workflow doesn't crash
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists. Skipping release creation."
          else
            echo "Creating new release: $TAG"
            gh release create "$TAG" \
              --title "Release $TAG" \
              --generate-notes
          fi